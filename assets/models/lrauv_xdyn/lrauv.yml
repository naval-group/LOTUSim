rotations convention: [psi, theta', phi'']

environmental constants:
  g: { value: 9.81, unit: m/s^2 }
  rho: { value: 1025, unit: kg/m^3 }
  nu: { value: 1.18e-6, unit: m^2/s }

environment models:
  - model: no waves
    constant sea elevation in NED frame: { value: 0, unit: m }
  - model: custom water current

# Fixed frame: NED
bodies: # All bodies have NED as parent frame
  - name: LRAUV

    # The mesh definition from this stl file is necessary for hydrostatic and Froud-Krylov
    mesh: /home/buche/LOTUSim_ws/src/lotusim/assets/models/lrauv_xdyn/tethys.stl

    position of body frame relative to mesh:
      frame: mesh
      x: { value: 0, unit: m }
      y: { value: 0, unit: m }
      z: { value: 0, unit: m }
      phi: { value: 0, unit: rad }
      theta: { value: 0, unit: rad }
      psi: { value: 0, unit: rad }

    initial position of body frame relative to NED:
      frame: NED
      x: { value: 0, unit: m }
      y: { value: 0, unit: m }
      z: { value: 0, unit: m }
      phi: { value: 0, unit: rad }
      theta: { value: 0, unit: rad }
      psi: { value: 0, unit: rad }

    initial velocity of body frame relative to NED:
      frame: LRAUV
      u: { value: 0, unit: m/s }
      v: { value: 0, unit: m/s }
      w: { value: 0, unit: m/s }
      p: { value: 0, unit: rad/s }
      q: { value: 0, unit: rad/s }
      r: { value: 0, unit: rad/s }

    dynamics:
      # This is taken from the LRAUV github
      hydrodynamic forces calculation point in body frame:
        x: { value: 0, unit: m }
        y: { value: 0, unit: m }
        z: { value: 0, unit: m }

      # This is taken from the LRAUV github
      centre of inertia:
        frame: LRAUV
        x: { value: 0, unit: m }
        y: { value: 0, unit: m }
        z: { value: 0, unit: m }

      # This is taken from the LRAUV github
      ? rigid body inertia matrix at the center of gravity and projected in the body frame
      : row 1: [146.5671, 0, 0, 0, 0, 0]
        row 2: [0, 146.5671, 0, 0, 0, 0]
        row 3: [0, 0, 146.5671, 0, 0, 0]
        row 4: [0, 0, 0, 3.00000, 0, 0]
        row 5: [0, 0, 0, 0, 41.98023, 0]
        row 6: [0, 0, 0, 0, 0, 41.98023]

      # This is taken from the LRAUV github
      ? added mass matrix at the center of gravity and projected in the body frame
      : row 1: [4.876161, 0, 0, 0, 0, 0]
        row 2: [0, 126.324739, 0, 0, 0, 0]
        row 3: [0, 0, 126.324739, 0, 0, 0]
        row 4: [0, 0, 0, 0, 0, 0]
        row 5: [0, 0, 0, 0, 33.46, 0]
        row 6: [0, 0, 0, 0, 0, 33.46]

    external forces:
      # needs inertia matrix
      - model: gravity

      # needs stl file
      - model: hydrostatic

      # needs stl file
      - model: non-linear Froude-Krylov

      # This is taken from the LRAUV github
      - model: quadratic damping
        damping matrix at the center of gravity projected in the body frame:
          row 1: [6.2282, 0, 0, 0, 0, 0]
          row 2: [0, 601.27, 0, 0, 0, 0]
          row 3: [0, 0, 601.27, 0, 0, 0]
          row 4: [0, 0, 0, 0.1916, 0, 0]
          row 5: [0, 0, 0, 0, 632.698, 0]
          row 6: [0, 0, 0, 0, 0, 632.698]

      # This is taken from the LRAUV github
      - model: linear damping
        damping matrix at the center of gravity projected in the body frame:
          row 1: [0, 0, 0, 0, 0, 0]
          row 2: [0, 0, 0, 0, 0, 0]
          row 3: [0, 0, 0, 0, 0, 0]
          row 4: [0, 0, 0, 0, 0, 0]
          row 5: [0, 0, 0, 0, 0, 0]
          row 6: [0, 0, 0, 0, 0, 0]

    controlled forces:
      - name: propeller
        model: wageningen B-series # False but idk what to do instead
        position of propeller frame:
          frame: mesh(LRAUV)
          x: { value: -1.43162, unit: m } # Check if it appears in the correct direction
          y: { value: 0, unit: m }
          z: { value: 0, unit: m }
          phi: { value: 0, unit: rad }
          theta: { value: 0, unit: deg }
          psi: { value: 0, unit: deg }
        wake coefficient w: 0.13 # IDK if it's w or (1-w) but I think it's good
        relative rotative efficiency etaR: 0.8 # Not sure
        thrust deduction factor t: 0.21978 # Hoping it's t and not (1-t) but I think it's good
        rotation: clockwise
        number of blades: 2
        blade area ratio AE/A0: 0.308 # WARNING: Value is way outside valid range for Xdyn (Wageningen B-series validity) - Multiply by 2 to fake it
        diameter: { value: 0.2539, unit: m }
