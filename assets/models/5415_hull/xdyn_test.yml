#   docker run --rm -u `id -u`:`id -g` -v `pwd`:/xdyn_demos -w /xdyn_demos sirehna/xdyn:v6-4-2 xdyn_test.yml --dt 0.1 --tend 10
# Around -1 to 1 wave height

rotations convention: [psi, theta', phi'']

environmental constants:
  g: { value: 9.81, unit: m/s^2 }
  rho: { value: 1000, unit: kg/m^3 }
  nu: { value: 1.18e-6, unit: m^2/s }
environment models:
  - model: waves
    discretization:
      n: 10
      omega min: { value: 0.1, unit: rad/s }
      omega max: { value: 6, unit: rad/s }
      energy fraction: 0.999
    spectra:
      - model: airy
        depth: { value: 100, unit: m }
        seed of the random data generator: 0
        stretching:
          delta: 1
          h: { unit: m, value: 0 }
        directional spreading:
          type: dirac
          waves propagating to: { value: 90, unit: deg }
        spectral density:
          type: jonswap
          Hs: { value: 2, unit: m }
          Tp: { value: 15, unit: s }
          gamma: 1.2
      - model: airy
        depth: { value: 100, unit: m }
        seed of the random data generator: 10
        stretching:
          delta: 1
          h: { unit: m, value: 0 }
        directional spreading:
          type: cos2s
          s: 2
          waves propagating to: { value: 90, unit: deg }
        spectral density:
          type: dirac
          # T = 12s -> omega = 2*pi/T=pi/6
          omega0: { value: 0.5235987755982988, unit: rad/s }
          Hs: { value: 2, unit: m }

    output:
      frame of reference: NED
      mesh:
        xmin: { value: 0, unit: m }
        xmax: { value: 0, unit: m }
        nx: 1
        ymin: { value: 0, unit: m }
        ymax: { value: 0, unit: m }
        ny: 1
bodies: # All bodies have NED as parent frame
  - name: vessel
    mesh: /home/helene/Documents/LOTUSim/liquidAi/src/liquidai/assets/models/5415_hull/5415_hull.stl
    # mesh: 5415_hull.stl
    
    # Not certain for all position. die la
    position of body frame relative to mesh:
      frame: mesh
      x: { value: 60.014, unit: m }
      # x: { value: 45.014, unit: m }
      y: { value: 0.0, unit: m }
      z: { value: -10, unit: m }
      phi: { value: 3.14159, unit: rad }
      theta: { value: 0, unit: rad }
      psi: { value: 0, unit: rad }
    initial position of body frame relative to NED:
      frame: NED
      x: { value: 0, unit: m }
      y: { value: 0, unit: m }
      z: { value: 0, unit: m }
      phi: { value: 0, unit: rad }
      theta: { value: 0, unit: rad }
      psi: { value: 0, unit: rad }
    initial velocity of body frame relative to NED:
      frame: vessel
      u: { value: 0, unit: m/s }
      v: { value: 0, unit: m/s }
      w: { value: 0, unit: m/s }
      p: { value: 0, unit: rad/s }
      q: { value: 0, unit: rad/s }
      r: { value: 0, unit: rad/s }
    dynamics:
      hydrodynamic forces calculation point in body frame:
        x: { value: 0, unit: m }
        y: { value: 0, unit: m }
        z: { value: 9.493, unit: m }
      centre of inertia:
        frame: mesh(vessel)
        x: { value: 0, unit: m }
        y: { value: 0, unit: m }
        z: { value: 7.555, unit: m }

      #   hydrodynamic forces calculation point in body frame:
      #   x: { value: 0, unit: m }
      #   y: { value: 0, unit: m }
      #   z: { value: -9.493, unit: m }
      # centre of inertia:
      #   frame: mesh(vessel)
      #   x: { value: 0, unit: m }
      #   y: { value: 0, unit: m }
      #   z: { value: -7.555, unit: m }
      
      mass: { value: 8710, unit: tonne }
      rigid body inertia matrix at the center of gravity and projected in the body frame: 
        row 1: [8.569e6,0,0,0,0,0]
        row 2: [0,8.569e6,0,0,0,0]
        row 3: [0,0,8.569e6,0,0,0]
        row 4: [0,0,0,4.271e8,0,0]
        row 5: [0,0,0,0,1.080e10,0]
        row 6: [0,0,0,0,0,1.080e10]
      added mass matrix at the center of gravity and projected in the body frame: 
        row 1: [8.979E+04,  0.000E+00, 1.981E+05,  0.000E+00, 1.962E+07, 0.000E+00]
        row 2: [0.000E+00,  2.172E+06, 0.000E+00, -1.135E+06, 0.000E+00, 2.523E+07]
        row 3: [1.981E+05,  0.000E+00, 9.680E+06,  0.000E+00, 6.716E+07, 0.000E+00]
        row 4: [0.000E+00, -1.135E+06, 0.000E+00,  3.865E+07, 0.000E+00, 2.228E+08]
        row 5: [1.962E+07,  0.000E+00, 6.716E+07,  0.000E+00, 9.117E+09, 0.000E+00]
        row 6: [0.000E+00,  2.523E+07, 0.000E+00,  2.228E+08, 0.000E+00, 3.338E+09]

    external forces:
      - model: gravity
      - model: non-linear hydrostatic (fast)
      - model: quadratic damping
        damping matrix at the center of gravity projected in the body frame:
          row 1: [0, 0, 0, 0, 0, 0]
          row 2: [0, 0, 0, 0, 0, 0]
          row 3: [0, 0, 1.9e5, 0, 0, 0]
          row 4: [0, 0, 0, 1.74e4, 0, 0]
          row 5: [0, 0, 0, 0, 4.67e6, 0]
          row 6: [0, 0, 0, 0, 0, 0]
      - model: resistance curve
        speed:
          {
            unit: m/s,
            values:
              [
                -1,
                0,
                0.5,
                1,
                1.5,
                2,
                2.5,
                3,
                3.5,
                4,
                4.5,
                5,
                5.5,
                6,
                6.5,
                7,
                7.5,
                8,
              ],
          }
        resistance:
          {
            unit: N,
            values:
              [
                -7.728E+02,
                0.000E+00,
                2.102E+02,
                7.728E+02,
                1.647E+03,
                2.803E+03,
                4.230E+03,
                5.999E+03,
                8.498E+03,
                1.273E+04,
                2.084E+04,
                2.789E+04,
                4.238E+04,
                7.737E+04,
                1.449E+05,
                2.439E+05,
                3.590E+05,
                4.741E+05,
              ],
          }
      # - name: propeller
      #   model: wageningen B-series
      #   position of propeller frame:
      #     frame: vessel
      #     x: { value: 0, unit: m }
      #     y: { value: 0, unit: m }
      #     z: { value: 0, unit: m }
      #     phi: { value: 0, unit: rad }
      #     theta: { value: 0, unit: deg }
      #     psi: { value: 0, unit: deg }
      #   wake coefficient w: 0
      #   relative rotative efficiency etaR: 1
      #   thrust deduction factor t: 0
      #   rotation: clockwise
      #   number of blades: 5
      #   blade area ratio AE/A0: 0.58
      #   diameter: { value: 6.15, unit: m }

output:
#   - format: csv
#     filename: xdyn_test.csv
#     data:
#       [
#         t,
#         x(vessel),
#         y(vessel),
#         z(vessel),
#         phi(vessel),
#         theta(vessel),
#         psi(vessel),
#       ]
  - format: hdf5
    filename: waves.h5
    data: [waves]
